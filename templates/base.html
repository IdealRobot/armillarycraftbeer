<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Armillary Brewery{% endblock %}</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Main Brewery CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/brewery.css') }}">

    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- Navigation -->
<header class="nav">

    <div class="logo-wrap">
        <a href="{{ url_for('home') }}">
            <img src="{{ url_for('static', filename='img/armlogo.png') }}" alt="Armillary Brewing Logo" class="main-logo">
        </a>
    </div>

    <div class="nav-inner">

        <nav class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('beers') }}">Current Beers</a>
            <a href="{{ url_for('events') }}">Events</a>
            <a href="{{ url_for('food') }}">Food</a>
            <a href="{{ url_for('about') }}">About</a>
            <a href="{{ url_for('contact') }}">Contact</a>
        </nav>

    </div>
</header>

    <!-- Main Content -->
    <main class="page-content">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">

        <div class="footer-inner">

            <div class="footer-brand">
                <h3>Armillary Brewery</h3>
                <p>Craft beer. Community. Colorado.</p>
            </div>

            <div class="footer-links">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('beers') }}">Beers</a>
                <a href="{{ url_for('events') }}">Events</a>
                <a href="{{ url_for('contact') }}">Contact</a>
            </div>

        </div>

    </footer>

</body>
</html>
